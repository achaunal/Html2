<!DOCTYPE html>
<html>
    <head>
        <title>Inrto to bootstrap</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        <style>
            .col-sm {
                text-align:center;
                border: 2px solid red;
            }
        </style>
    </head>
    <body>
        <h3>Equal width column grid</h3>
        <div class="container">
            <div class="row">
                <div class="col-sm">
                    Column 1
                </div>
                <div class="col-sm">
                    Column 2
                </div>
                 <div class="col-sm">
                    Column 3
                </div>
            </div>
        </div>
    </body>
</html>
