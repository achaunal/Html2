<!DOCTYPE html>
<html>
    <head>
        <style>
            div {
                right: 30px;
                border:3px solid yellowgreen
            }
            div.absolute {
                position: absolute;
                left: 50px;
                border: 3px solid rebeccapurple
            }
            div.relative {
                position:relative;
                left:50px;
                border: 3px solid antiquewhite
            }
            div.fixed {
                position:fixed;
                top:0;
                right :20px;
                width: 300px;
                border: 3px solid salmon;
            }
            div.sticky {
                position:sticky;
                top:1px;
                left:20px;
                width:200px;
                border: 3px solid antiquewhite
            }
        </style>
    </head>
    <body>
        <h2>POSITION</h2>
        <div> div with no position property
        </div>
        <div class="relative">
            This div element has a position; relative;
        </div>
        <div class="sticky">
            Div with sticky position property
        </div>
        <div class="absolute">
            absolute
        </div>
        <div class="fixed">
            div with fixed property
        </div>
