<!DOCTYPE html>
<html>
    <head>
          <style>
            div {
                background-color:green;
                padding: 10px;
            }
            div.frist {
                opacity: 0.1;
            }
            div.second {
                opacity: 0.4;
            }
            div.third {
                opacity:0.6;
            }
        </style>
    </head>
    <body>
      <h1>
        The opacity Property
      </h1>
      <p> this is how this property loks</p>
      <div class="frist"><p>opacity 0.1</p></div>
      <div class="second"><p>opacity 0.4</p></div>
      <div class="third"><p>opacity 0.6</p></div>
      <div><p>opacity 1 (default)</p></div>      
    </body>
</html>
